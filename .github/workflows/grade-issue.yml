name: Grade Workshop Issue

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to grade from the issue body, for maintainer debugging
        required: false
        type: number
      comment_id:
        description: Issue comment ID to grade
        required: false
        type: number

permissions:
  contents: read
  issues: write

concurrency:
  group: grade-issue-${{ github.event.comment.id || inputs.comment_id || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  grade:
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.issue.pull_request && github.event.comment.user.type != 'Bot' && contains(github.event.issue.labels.*.name, 'submission')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Decrypt answer rubric
        env:
          ANSWER_KEY_PRIVATE_KEY: ${{ secrets.ANSWER_KEY_PRIVATE_KEY }}
        run: |
          test -n "$ANSWER_KEY_PRIVATE_KEY"
          printf '%s' "$ANSWER_KEY_PRIVATE_KEY" > "$RUNNER_TEMP/answer_key.pem"
          chmod 600 "$RUNNER_TEMP/answer_key.pem"
          openssl cms -decrypt \
            -inform DER \
            -in .github/workshop/answers.json.cms \
            -recip .github/workshop/answer_key_cert.pem \
            -inkey "$RUNNER_TEMP/answer_key.pem" \
            -out "$RUNNER_TEMP/answers.json"
          rm -f "$RUNNER_TEMP/answer_key.pem"

      - name: Grade issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number || '' }}
          COMMENT_ID: ${{ github.event.comment.id || inputs.comment_id || '' }}
        run: |
          args=(
            --answer-key "$RUNNER_TEMP/answers.json"
            --report "$RUNNER_TEMP/report.md"
            --result "$RUNNER_TEMP/result.json"
          )
          if [ -n "$ISSUE_NUMBER" ]; then
            args+=(--issue-number "$ISSUE_NUMBER")
          fi
          if [ -n "$COMMENT_ID" ]; then
            args+=(--comment-id "$COMMENT_ID")
          fi
          python3 scripts/grade_issue.py "${args[@]}"

      - name: Comment and label
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync(`${process.env.RUNNER_TEMP}/report.md`, "utf8");
            const result = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/result.json`, "utf8"));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(result.issue_number);
            const status = result.status || (result.passed ? "passed" : "needs-correction");
            const managedLabels = {
              "passed": { color: "0e8a16", description: "Submission passed all answer checks" },
              "in-progress": { color: "1d76db", description: "Latest submission is partially complete with no submitted wrong answers" },
              "needs-correction": { color: "fbca04", description: "Latest submission needs another pass" },
            };

            for (const [name, options] of Object.entries(managedLabels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, ...options });
              }
            }

            await github.rest.issues.createComment({ owner, repo, issue_number, body: report });
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [status] });
            for (const name of [...Object.keys(managedLabels), "needs-review"]) {
              if (name === status) continue;
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
