name: Mini workshop answers
description: Open one group issue, then submit answers as comments.
title: "[Workshop answers] "
labels:
  - submission
  - needs-review
body:
  - type: markdown
    attributes:
      value: |
        Open one issue for your group. After creating it, submit answers as
        comments in the issue timeline. Each new non-bot comment is graded once.

        Keep answers short: span names, document IDs, and concise decisions are
        enough. If you want to retry, post a new comment.
  - type: input
    id: group
    attributes:
      label: Group
      description: Your workshop group, for example group-00.
      placeholder: group-00
    validations:
      required: true
  - type: textarea
    id: note
    attributes:
      label: Initial note
      description: Optional. Put answers in comments after the issue is created.
      value: |
        Submit answers as comments using this format:

        Case: 001
        A:
        B:
        C:
        D:
    validations:
      required: false
