name: Mini workshop answers
description: Submit one issue and keep editing it as you answer cases.
title: "[Workshop answers] "
labels:
  - submission
  - needs-review
body:
  - type: markdown
    attributes:
      value: |
        Submit one plain-text issue and keep editing it as you answer more
        cases. Keep answers short: span names, document IDs, and concise
        decisions are enough. Blank answers are ignored until you fill them in;
        submitted wrong answers are marked for correction.
  - type: input
    id: group
    attributes:
      label: Group
      description: Your workshop group, for example group-00.
      placeholder: group-00
    validations:
      required: true
  - type: textarea
    id: answers
    attributes:
      label: Answers
      description: Fill in one case or several cases. Add more case blocks as you progress.
      value: |
        Case: 001
        A:
        B:
        C:
        D:
    validations:
      required: true
